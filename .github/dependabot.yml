version: 2
updates:
  # npm dependencies — weekly
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    versioning-strategy: 'increase'
    labels:
      - 'dependencies'
      - 'needs-triage'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      # Group all minor/patch dev-tooling bumps to reduce PR noise
      dev-tooling:
        patterns:
          - 'eslint*'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
        update-types:
          - 'minor'
          - 'patch'
      # Group all minor/patch baileys-related bumps
      baileys-stack:
        patterns:
          - '@whiskeysockets/*'
          - '@hapi/boom'
          - 'pino*'
          - 'ws'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Pin music-metadata below 11.12.2 — see Baileys issue #2410
      - dependency-name: 'music-metadata'
        versions: ['>=11.12.2']

  # GitHub Actions workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
    labels:
      - 'github-actions'
      - 'dependencies'
    commit-message:
      prefix: 'chore(ci)'

  # Docker (Dockerfile base image)
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 2
    labels:
      - 'docker'
      - 'dependencies'
    commit-message:
      prefix: 'chore(docker)'
