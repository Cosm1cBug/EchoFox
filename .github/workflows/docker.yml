name: Docker

on:
  # v1.4.0: build & publish on every v* tag (release-driven)
  push:
    tags:
      - 'v*'
  schedule:
    # Weekly rebuild to absorb base-image security patches
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=$VERSION"             >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR"     >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA"         >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cosm1cbug/echofox:${{ steps.version.outputs.version }}
            ghcr.io/cosm1cbug/echofox:${{ steps.version.outputs.major_minor }}
            ghcr.io/cosm1cbug/echofox:sha-${{ steps.version.outputs.short_sha }}
            ghcr.io/cosm1cbug/echofox:latest
            cosm1cbug/echofox:${{ steps.version.outputs.version }}
            cosm1cbug/echofox:${{ steps.version.outputs.major_minor }}
            cosm1cbug/echofox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max