name: npm publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD~1 for the version-bump diff

      - name: Decide whether to publish
        id: decide
        run: |
          # Tag pushes + manual: always publish.
          # Push-to-main: only publish if package.json version changed.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            CURRENT=$(node -p "require('./package.json').version")
            PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null \
              | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).version||'0.0.0')}catch{console.log('0.0.0')}})" \
              || echo '0.0.0')
            if [ "$CURRENT" != "$PREVIOUS" ]; then
              echo "publish=true" >> $GITHUB_OUTPUT
              echo "🔼 version bumped: $PREVIOUS → $CURRENT — publishing"
            else
              echo "publish=false" >> $GITHUB_OUTPUT
              echo "⏭️  no version change on main — skipping npm publish"
            fi
          fi

      - name: Setup Node.js
        if: steps.decide.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        # v1.11.2: dropped --ignore-scripts — see header comment.
        if: steps.decide.outputs.publish == 'true'
        run: npm ci

      - name: Run tests (gate the publish)
        if: steps.decide.outputs.publish == 'true'
        run: npm test

      - name: Resolve version
        id: ver
        if: steps.decide.outputs.publish == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "v${VERSION}" != "${TAG}" ]]; then
            echo "::error::package.json version (${VERSION}) does not match pushed tag (${TAG})"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        if: steps.decide.outputs.publish == 'true'
        run: |
          if npm view "echofox@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "already=true"  >> $GITHUB_OUTPUT
            echo "::notice::echofox@${{ steps.ver.outputs.version }} is already on npm — skipping"
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm (with provenance)
        if: steps.decide.outputs.publish == 'true' && steps.check.outputs.already == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
