name: Dependabot auto-merge

# v1.11.0:
#   Auto-merges Dependabot PRs that are SAFE to land without review:
#     ✅ patch bumps   (1.2.3 → 1.2.4)              — always
#     ✅ minor bumps   (1.2.3 → 1.3.0)              — always
#     ❌ major bumps   (1.2.3 → 2.0.0)              — NEVER (require manual review)
#
#   The merge only happens when ALL required status checks (CI, headers,
#   prettier, security, secret-scanning) pass. If any gate fails the PR
#   stays open for you to inspect.
#
#   How it works:
#     1. Trigger: `pull_request_target` (the only event with write perms
#        on Dependabot PRs — needed to call `gh pr merge`).
#     2. Filter: only act if actor == 'dependabot[bot]'.
#     3. Use `dependabot/fetch-metadata@v2` to read the bump severity.
#     4. If patch or minor, enable auto-merge (squash). GitHub waits for
#        required status checks then merges automatically.
#
#   This workflow does NOT bypass branch protection. If your `main`
#   branch requires status checks, Dependabot's PR will still wait for
#   them to pass before the auto-merge fires.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge safe Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false

    steps:
      - name: Read Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide
        id: decide
        run: |
          UT="${{ steps.meta.outputs.update-type }}"
          # update-type values from fetch-metadata@v2:
          #   version-update:semver-patch
          #   version-update:semver-minor
          #   version-update:semver-major
          if [[ "$UT" == "version-update:semver-patch" || "$UT" == "version-update:semver-minor" ]]; then
            echo "merge=true" >> $GITHUB_OUTPUT
            echo "✅ $UT — eligible for auto-merge"
          else
            echo "merge=false" >> $GITHUB_OUTPUT
            echo "🚫 $UT — needs manual review"
          fi

      - name: Enable auto-merge (squash)
        if: steps.decide.outputs.merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Squash-merge keeps history clean. GitHub will wait for required
          # checks then auto-merge. If checks fail, the PR stays open.
          gh pr merge --auto --squash "$PR_URL"
          gh pr review --approve "$PR_URL" || true   # optional 'auto-approved' marker
