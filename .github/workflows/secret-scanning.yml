name: Secret Scanning

# v1.4.3: split base/head handling between PR and push events.
#   - On pull_request: scan the diff between PR base + PR head (the original behaviour)
#   - On push:         scan only the pushed commit range (default branch can't diff itself)
#   - On workflow_dispatch / scheduled: scan the entire repository history
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Pull request: diff PR head against PR base. This is the original behaviour
      # that worked correctly — only push-to-main was broken because base==head.
      - name: TruffleHog scan (pull_request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      # Push: scan the commit range that was pushed. github.event.before holds
      # the previous tip of the branch; HEAD is the new tip.
      # When before is 0000…0000 (first push, new branch) we fall back
      # to a single-commit scan via the workflow_dispatch path.
      - name: TruffleHog scan (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --results=verified,unknown

      # Manual dispatch OR very first push to a branch: do a full filesystem scan.
      # No diff mode — TruffleHog walks every tracked file looking for secrets.
      - name: TruffleHog scan (full)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000')
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
