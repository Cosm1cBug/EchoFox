name: Deploy Documentation

# v1.11.0:
#   - Triggers on every push to main (was: only docs/** changes).
#     Reason: `scripts/generate-command-docs.js` regenerates docs/commands.md
#     from src/commands/ — we want the docs site to reflect the latest
#     command catalog on every release, not just when docs/ is hand-edited.
#   - One-time setup required: enable GitHub Pages in repo settings →
#     Pages → Source: GitHub Actions. See SETUP-PAGES.md in repo root.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: 'pages'
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate command catalog from source
        # Keep docs/commands.md in sync with src/commands/ before building.
        run: npm run docs:commands

      - name: Build VitePress site
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
