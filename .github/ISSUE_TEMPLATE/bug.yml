name: 🐛 Bug Report
description: Something is broken in EchoFox.
title: '[bug] '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        Before submitting, please:
        - Search [existing issues](https://github.com/Cosm1cBug/EchoFox/issues?q=is%3Aissue) to avoid duplicates.
        - If this is a **security** vulnerability, do **not** file it here — see [SECURITY.md](https://github.com/Cosm1cBug/EchoFox/blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: EchoFox version
      description: "Run `git describe --tags --always` or check the tag you're on."
      placeholder: 'v0.2.0-alpha (commit abc1234)'
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: 'Output of `node -v`'
      placeholder: 'v20.18.0'
    validations:
      required: true

  - type: input
    id: baileys
    attributes:
      label: Baileys version
      description: 'From package.json or `npm ls @whiskeysockets/baileys`'
      placeholder: '7.0.0-rc13'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (specify distro below)
        - macOS
        - Windows
        - Docker (specify host OS below)
        - Other
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: How are you running EchoFox?
      options:
        - npm run dev (bare metal)
        - npm start (bare metal)
        - PM2
        - Docker / docker-compose
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: 'When I run `.menu` the bot crashes with…'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run dev`
        2. Scan QR
        3. Send `.menu` from another WhatsApp
        4. See error in terminal
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: 'Paste the **full** stack trace — not just the error message. Use code fences (```).'
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config (REDACT keys/JIDs)
      description: 'Paste only the relevant sections of `src/config.js`. **Remove API keys and phone numbers!**'
      render: javascript

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I'm on a supported Node version (≥ 20).
          required: true
        - label: I've redacted any secrets (API keys, full phone numbers) from logs and config.
          required: true
